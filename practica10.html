<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--La etiqueta table se utiliza para definir tablas en HTML.Todo el contenido de la tabla, inlcuidoas las filas y celdas, se coloca dentro de esta etiqueta-->

    <!--La etiqueta tr se ustiliza para definir una fila en una tabla.cada fila puede contener una o mas celdas, que se definen utilizando las etiquetas td(para celdas de datos)o th (para celdas de encabezado)-->

    <!--La etiqueta th define una celda de encabezado dentro de una fila.Cada etiqueta th representa un encabezado de la colimna en la tabla-->
<table border="1"><!--etiqueta de apertura-->

<tr><!--fila 1-->
    <th>encabezado 1</th><!--celda de encabezado-->
    <th>encabezado 2</th><!--celda de encabezado-->
    <th>encabezado 3</th><!--celda de encabezado-->
</tr>
<tr><!--fila 2-->
    <th>dato 1</th><!--celda de datos-->
    <th>dato 2</th><!--celda de datos-->
    <th>dato 3</th><!--celda de datos-->
</tr>
<tr><!--fila 3-->
    <th>dato 4</th><!--celda de datos-->
    <th>dato 5</th><!--celda de datos-->
    <th>dato 6</th><!--celda de datos-->
</tr>


</table><!--etiqueta de cierre-->

<br>
<table border="1">
    <caption>Paises y capitales</caption>
    <tr>
        <th>Pais</th>
        <th>Capital</th>
    </tr>
    <tr>
        <th>españa</th>
        <th>madrid</th>
    </tr>
    <tr>
        <th>francia</th>
        <th>paris</th>
    </tr>
    <tr>
        <th>italia</th>
        <th>roma</th>
    </tr>

</table>
<table border="1"><!--tabla con celdas combinadas-->
<tr>
    <th colspan="4">Mundial de futbol</th>
    <th rowspan="2">Paises con mayoria de goles</th>
</tr>

<tr>
    <td>Alemania</td> <td>180</td>
</tr>

<tr>
    <td>argentina</td> <td>150</td>
</tr>
</table>


</body>
</html>
