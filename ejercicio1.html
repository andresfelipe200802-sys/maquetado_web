<!DOCTYPE html>
<!--
Le dice al navegador que este documento usa HTML5.
Es importante porque asegura que el navegador interprete el código correctamente.
-->
<html lang="en">
    <!--
Es la etiqueta raíz que envuelve todo el contenido de la página.
lang="en" indica que el idioma principal es inglés.
(Si tu página está en español, podrías usar lang="es").
-->
<head> 
<!--Contiene información sobre la página, pero no lo que el usuario ve directamente. -->
    <meta charset="UTF-8">
    <!--Define la codificación de caracteres.
UTF-8 permite usar tildes, ñ, emojis, etc.
Sin esto, algunos caracteres podrían verse mal.-->

    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--Hace que la página sea responsive (se adapte a celulares y tablets).
width=device-width: ajusta el ancho al dispositivo.
initial-scale=1.0: nivel de zoom inicial.-->

    <title>Document</title><!--Es el título de la página.
Aparece en la pestaña del navegador.
También lo usan los buscadores.-->

</head> <!--Cierra la sección de configuración.-->
<body> 
<!--Aquí va todo lo visible de la página.
Ejemplos:
Texto
Imágenes
Botones
Videos
En tu caso está vacío, por eso no ves nada.-->

</body> <!--Cierra el contenido visible.-->
</html> <!--Cierra todo el documento HTML.-->
