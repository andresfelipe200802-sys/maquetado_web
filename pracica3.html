<!DOCTYPE html>
<!--
<!DOCTYPE html>
Define el tipo de documento. Indica al navegador que se está usando HTML5.
Es obligatorio para que la página se interprete correctamente.
-->

<html lang="en">
<!--
<html>
Es la etiqueta raíz que contiene todo el documento HTML.

lang="en"
Indica el idioma del contenido. En este caso inglés.
Se puede cambiar a "es" para español.
-->

<head>
    <!--
    <head>
    Contiene información de configuración de la página.
    No es contenido visible para el usuario.
    -->

    <meta charset="UTF-8">
    <!--
    Define la codificación de caracteres.
    UTF-8 permite usar letras, símbolos, tildes y emojis correctamente.
    -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
    Hace que la página sea adaptable a dispositivos móviles (responsive).
    Ajusta el ancho según el dispositivo y controla el zoom inicial.
    -->

    <title>Document</title>
    <!--
    Define el título de la página.
    Aparece en la pestaña del navegador.
    -->

</head>

<body>
    <!--
    <body>
    Contiene todo el contenido visible de la página web.
    Aquí van textos, imágenes, botones, etc.
    -->

    <h1>titulo principal o de primer orden</h1>
    <!--
    <h1>
    Es el encabezado más importante.
    Se usa para el título principal de la página.
    Se recomienda usar solo uno por página.
    -->

    <h2>titulo de segundo orden</h2>
    <!--
    <h2>
    Representa un subtítulo o sección principal.
    Tiene menor importancia que <h1>.
    -->

    <h3>titulo de tercer orden</h3>
    <!--
    <h3>
    Se usa para subsecciones dentro de un <h2>.
    -->

    <h4>titulo de cuarto orden</h4>
    <!--
    <h4>
    Nivel más específico dentro de la estructura.
    -->

    <h5>titulo de quinto orden</h5>
    <!--
    <h5>
    Se usa para detalles o divisiones más pequeñas.
    -->

    <h6>titulo de sexto orden</h6>
    <!--
    <h6>
    Es el nivel más bajo de encabezado.
    Se usa para información muy específica.
    -->

</body>

</html>
<!--
</html>
Cierra el documento HTML completo.
-->
