<!DOCTYPE html>
<html lang="en">
<head>
    <!--
    <head>
    Contiene configuraciones de la página.
    No es visible para el usuario.
    -->

    <meta charset="UTF-8">
    <!--
    Define la codificación de caracteres.
    Permite usar tildes, símbolos y caracteres especiales.
    -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
    Hace que la página sea adaptable a dispositivos móviles.
    Ajusta el tamaño según la pantalla.
    -->

    <title>Document</title>
    <!--
    Define el título de la página.
    Aparece en la pestaña del navegador.
    -->

</head>

<body>
    <!--
    <body>
    Contiene todo el contenido visible de la página web.
    -->
    <ul>
        <!--
        <ul> (Unordered List)
        Crea una lista desordenada.
        Los elementos aparecen con viñetas (puntos).
        El orden no es importante.
        -->

        <li>elemento 1</li>
        <!--
        <li> (List Item)
        Representa un elemento dentro de la lista.
        -->

        <li>elemento 2</li>
        <!--
        Otro elemento de la lista.
        -->

        <li>elemento 3</li>
        <!--
        Otro elemento de la lista.
        -->

    </ul>
</body>
</html>
